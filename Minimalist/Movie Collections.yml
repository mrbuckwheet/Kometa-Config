##These collection are created as if you were using the advanced search field in Plex. Below are filters for Imax and 4k Dolby Vision Movies.
##You can add or remove filters baised on your own preferences. 

templates: ### this is the template for building a dynamic collection
  collection:
    optional:
      - value
      - movie
    tmdb_collection_details: <<value>>
    tmdb_movie: <<movie>>
    sync_mode: sync
    collection_order: release ### sort option for the collection
    minimum_items: 2 ### adjust this to the min number of movies for a collection to be built 
    delete_below_minimum: true  ### if a movie is deleted from your library and the collection is now below the min this option will delete the collection

collections:
  4K Dolby Vision: #fiters only movies with 4K and Dolby Vision and places them in a collection 
    plex_all: true
    filters: 
      label: Dolby Vision
      resolution: 4k
    sort_title: "!021_+01 4K Dolby Vision"
    collection_order: title.asc
    file_poster: /config/Collection Posters/DV.png
  Dolby Vision Profile 5:
    plex_all: true
    filters: 
      label: Dolby Vision P5
      resolution: 4k
    sort_title: "!021_+05 Dolby Vision Profile 5"
    collection_order: title.asc
    file_poster: /config/Collection Posters/DV_P5.png
  Dolby Vision FEL:
    plex_all: true
    filters: 
      label: Dolby Vision P7 FEL
      resolution: 4k
    sort_title: "!021_+02 Dolby Vision FEL"
    collection_order: title.asc
    file_poster: /config/Collection Posters/DV_FEL.png
  Dolby Vision MEL:
    plex_all: true
    filters: 
      label: Dolby Vision P7 MEL
      resolution: 4k
    sort_title: "!021_+03 Dolby Vision MEL"
    collection_order: title.asc
    file_poster: /config/Collection Posters/DV_MEL.png
  Dolby Vision Profile 8:
    plex_all: true
    filters: 
      label: Dolby Vision P8
      resolution: 4k
    sort_title: "!021_+04 Dolby Vision Profile 8"
    collection_order: title.asc
    file_poster: /config/Collection Posters/DV_P8.png
  IMAX:
    plex_search:
      any: 
        edition: 
          - Imax
          - Extended Imax
          - Imax-E
    sort_title: "!021_+06 IMAX"
    collection_order: title.asc
    url_poster: https://theposterdb.com/api/assets/224736
  

dynamic_collections:
  TMDb Collections:          # This name is the mapping name
    template: collection
    type: tmdb_collection
    #remove_suffix: "Collection"